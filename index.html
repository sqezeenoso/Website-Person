<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium iOS Music Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #121212;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sec: rgba(255, 255, 255, 0.6);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh; /* Biar bisa memanjang kalau layar sempit */
            display: flex;
            flex-direction: column; /* Susun card dan footer secara vertikal */
            justify-content: center;
            align-items: center;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            transition: background 0.8s ease;
            padding: 20px 0; /* Kasih jarak atas bawah buat mobile */
        }

        #bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(60px) brightness(0.4);
            z-index: -1;
            transition: background-image 0.8s ease;
        }

        #upload-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .custom-file-upload {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #file-input { display: none; }

        .player-card {
            width: 90%; /* Responsif di HP */
            max-width: 360px; /* Lebar maksimal di Desktop */
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: left;
        }

        .cover-art {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 20px;
            margin-bottom: 30px;
            background: #282828;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #cover-img { width: 100%; height: 100%; object-fit: cover; }

        .song-details { margin-bottom: 25px; padding: 0 5px; }
        .song-details .device { font-size: 14px; color: var(--text-sec); font-weight: 600; }
        #song-title { font-size: 24px; font-weight: 700; color: white; margin: 5px 0 2px 0; }
        #artist-name { font-size: 18px; color: var(--text-sec); margin: 0; }

        .progress-area { width: 100%; margin-top: 20px; }
        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 5px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            cursor: pointer;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .time-box {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-sec);
            margin-top: 10px;
            font-variant-numeric: tabular-nums;
        }

        .main-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 35px 0;
            padding: 0 15px;
        }

        .btn-ctrl {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        .btn-side { font-size: 32px; width: 40px; }
        .btn-play { font-size: 55px; width: 60px; }
        .btn-ctrl:active { transform: scale(0.9); opacity: 0.7; }

        .volume-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 5px;
        }
        .volume-box i { color: var(--text-sec); font-size: 12px; }
        .v-slider { flex: 1; height: 4px; }

        /* Footer Credit - Sekarang mengikuti alur halaman agar tidak nabrak */
        .footer-credit {
            margin-top: 30px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            text-align: center;
            width: 100%;
            font-weight: 500;
        }

        /* Penyesuaian untuk layar yang sangat pendek (HP model lama/kecil) */
        @media (max-height: 750px) {
            .player-card { padding: 20px; }
            .cover-art { margin-bottom: 15px; }
            .main-controls { margin: 15px 0 25px 0; }
            #song-title { font-size: 20px; }
            #artist-name { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="bg-overlay"></div>

    <div id="upload-container">
        <label for="file-input" class="custom-file-upload">
            <i class="fas fa-plus"></i> Add Music
        </label>
        <input type="file" id="file-input" accept="audio/mp3">
    </div>

    <div class="player-card">
        <div class="cover-art">
            <img id="cover-img" src="" style="display:none">
            <i id="default-icon" class="fas fa-music" style="font-size:80px; color:#333"></i>
        </div>

        <div class="song-details">
            <div class="device">iPhone</div>
            <div id="song-title">Select Song</div>
            <p id="artist-name">Music Player</p>
        </div>

        <div class="progress-area">
            <input type="range" class="slider" id="progress-bar" value="0" min="0" step="0.1">
            <div class="time-box">
                <span id="curr-time">0:00</span>
                <span id="total-time">-0:00</span>
            </div>
        </div>

        <div class="main-controls">
            <button class="btn-ctrl btn-side"><i class="fas fa-backward-step"></i></button>
            <button class="btn-ctrl btn-play" id="play-btn"><i class="fas fa-play"></i></button>
            <button class="btn-ctrl btn-side"><i class="fas fa-forward-step"></i></button>
        </div>

        <div class="volume-box">
            <i class="fas fa-volume-off"></i>
            <input type="range" class="slider v-slider" id="vol-slider" min="0" max="1" step="0.01" value="0.8">
            <i class="fas fa-volume-high"></i>
        </div>
    </div>

    <div class="footer-credit">
        © 2026 Sqezee Noso | Music Player
    </div>

    <audio id="main-audio"></audio>

    <script>
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const progBar = document.getElementById('progress-bar');
        const volSlider = document.getElementById('vol-slider');
        const bgOverlay = document.getElementById('bg-overlay');
        const coverImg = document.getElementById('cover-img');
        const defaultIcon = document.getElementById('default-icon');

        function updateThemedBackground(imgSrc) {
            bgOverlay.style.backgroundImage = `url(${imgSrc})`;
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;

            const url = URL.createObjectURL(file);
            audio.src = url;

            jsmediatags.read(file, {
                onSuccess: function(tag) {
                    const t = tag.tags;
                    document.getElementById('song-title').innerText = t.title || file.name;
                    document.getElementById('artist-name').innerText = t.artist || "Unknown Artist";
                    
                    if(t.picture) {
                        const { data, format } = t.picture;
                        let base64 = "";
                        for (let i = 0; i < data.length; i++) base64 += String.fromCharCode(data[i]);
                        const finalImg = `data:${format};base64,${window.btoa(base64)}`;
                        coverImg.src = finalImg;
                        coverImg.style.display = "block";
                        defaultIcon.style.display = "none";
                        updateThemedBackground(finalImg);
                    }
                }
            });
        });

        playBtn.addEventListener('click', () => {
            if(audio.paused) {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
        });

        audio.addEventListener('timeupdate', () => {
            if(!isNaN(audio.duration)) {
                const perc = (audio.currentTime / audio.duration) * 100;
                progBar.value = perc;
                progBar.max = 100;

                document.getElementById('curr-time').innerText = formatTime(audio.currentTime);
                document.getElementById('total-time').innerText = "-" + formatTime(audio.duration - audio.currentTime);
            }
        });

        progBar.addEventListener('input', () => {
            const seekTime = (progBar.value / 100) * audio.duration;
            audio.currentTime = seekTime;
        });

        volSlider.addEventListener('input', () => {
            audio.volume = volSlider.value;
        });

        function formatTime(secs) {
            let m = Math.floor(secs / 60);
            let s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0'+s : s}`;
        }
    </script>
</body>
</html>
