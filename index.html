<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Music Player - Fade Saat Scroll</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --card: rgba(30, 30, 50, 0.85);
    --glass: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.12);
    --text: #ffffff;
    --text-sub: rgba(255,255,255,0.55);
    --accent: #ffffff;
    --progress-bg: rgba(255,255,255,0.2);
    --progress-fill: #ffffff;
    --btn: rgba(255,255,255,0.12);
    --btn-hover: rgba(255,255,255,0.2);
    --shadow: 0 40px 80px rgba(0,0,0,0.6);

    /* pengaturan judul scroll */
    --title-fade-width: 50px; /* lebar fade di sisi kiri dan kanan */
    --title-fade-color: rgba(28,28,40,0.75); /* warna fade transparan untuk blend dengan latar player */
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, #1e1b4b 0%, #0f0e1a 40%, #0a0a14 100%);
    font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 20% 80%, rgba(99,102,241,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(168,85,247,0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Upload button - top right */
  .upload-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 50px;
    padding: 10px 20px;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }

  .upload-btn:hover {
    background: rgba(255,255,255,0.18);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .upload-btn svg {
    width: 15px;
    height: 15px;
    opacity: 0.9;
  }

  #fileInput { display: none; }

  /* Player card */
  .player-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    position: relative;
  }

  .player {
    width: 370px;
    background: rgba(28, 28, 40, 0.92);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-radius: 44px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow:
      0 60px 120px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.12),
      inset 0 -1px 0 rgba(0,0,0,0.3);
    padding: 0 0 28px 0;
    overflow: hidden;
    position: relative;
  }

  /* Dynamic island */
  .dynamic-island {
    width: 120px;
    height: 34px;
    background: #000;
    border-radius: 20px;
    margin: 12px auto 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  .di-camera {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #1a1a2e;
    border: 2px solid rgba(255,255,255,0.07);
    position: relative;
  }

  .di-camera::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #2a2a4e;
  }

  /* Artwork area */
  .artwork-section {
    padding: 24px 28px 20px;
    position: relative;
  }

  .artwork-container {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    background: linear-gradient(135deg, #1e1e35 0%, #2d2d50 100%);
    box-shadow:
      0 20px 60px rgba(0,0,0,0.6),
      0 4px 16px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.06);
    transition: transform 0.3s ease;
  }

  .artwork-container.playing {
    animation: subtlePulse 3s ease-in-out infinite;
  }

  @keyframes subtlePulse {
    0%, 100% { transform: scale(1); box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.4); }
    50% { transform: scale(1.01); box-shadow: 0 24px 70px rgba(0,0,0,0.65), 0 6px 20px rgba(0,0,0,0.45); }
  }

  .artwork-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  .artwork-img.visible { display: block; }

  .artwork-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(145deg, #1e1e35, #2a2a4a);
  }

  .artwork-placeholder svg {
    width: 90px;
    height: 90px;
    opacity: 0.3;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  }

  /* Song info */
  .song-info {
    padding: 0 28px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .text-wrapper {
    flex: 1;
    min-width: 0;
  }

  .song-text {
    width: 100%;
    overflow: hidden;
    position: relative;
    /* DEFAULT: Hanya pudar di kanan pas diam */
    -webkit-mask-image: linear-gradient(to right, 
      black 0%, 
      black 90%, 
      transparent 100%
    );
    mask-image: linear-gradient(to right, 
      black 0%, 
      black 90%, 
      transparent 100%
    );
  }

  .song-text.is-scrolling {
    -webkit-mask-image: linear-gradient(to right, 
      transparent 0%, 
      black 10%, 
      black 90%, 
      transparent 100%
    );
    mask-image: linear-gradient(to right, 
      transparent 0%, 
      black 10%, 
      black 90%, 
      transparent 100%
    );
  }

  .song-name {
    font-size: 22px;
    font-weight: 700;
    white-space: nowrap;
    display: inline-block;
    width: max-content;
    color: white;
  }

  .song-scrolling-anim {
    /* Total durasi 12 detik (termasuk jeda) */
    animation: scroll 10s linear infinite;
    animation: scrollWithPause 12s linear infinite;
  }

  @keyframes scrollWithPause {
    0% { transform: translateX(0); }
    100% { transform: translateX(var(--scroll-dist)); }
  }

  .song-artist {
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Animasi scroll ke kiri - akan diaktifkan via JS dengan class */
  @keyframes scrollTextLeft {
    0% {
      transform: translateX(0);
    }
    100% {
      transform: translateX(var(--scroll-dist, -100px));
    }
  }

  /* Class untuk animasi scroll (bergerak ke kiri terus) */
  .song-name.song-scrolling {
    animation: scrollTextLeft 10s linear infinite;
    will-change: transform;
  }

  .heart-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    cursor: pointer;
    flex-shrink: 0;
    margin-left: 12px;
    transition: transform 0.15s ease;
  }

  .heart-btn:active { transform: scale(0.85); }

  .heart-btn svg {
    width: 22px;
    height: 22px;
    fill: none;
    stroke: rgba(255,255,255,0.4);
    stroke-width: 1.8;
    transition: all 0.2s ease;
  }

  .heart-btn.liked svg {
    fill: #ff3b5c;
    stroke: #ff3b5c;
  }

  /* Progress bar */
  .progress-section {
    padding: 0 28px;
    margin-bottom: 8px;
  }

  .progress-track {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.18);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    margin-bottom: 6px;
    transition: height 0.15s ease;
  }

  .progress-track:hover { height: 6px; }

  .progress-fill {
    height: 100%;
    background: #ffffff;
    border-radius: 2px;
    pointer-events: none;
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .progress-track:hover .progress-fill::after { opacity: 1; }

  .time-labels {
    display: flex;
    justify-content: space-between;
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }

  /* Controls */
  .controls {
    padding: 4px 28px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.15s ease;
    padding: 8px;
  }

  .ctrl-btn:hover { background: rgba(255,255,255,0.08); }
  .ctrl-btn:active { transform: scale(0.88); background: rgba(255,255,255,0.12); }

  .ctrl-btn.small svg { width: 28px; height: 28px; fill: rgba(255,255,255,0.85); }

  .play-btn {
    width: 68px;
    height: 68px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.2);
    padding: 0;
  }

  .play-btn:hover {
    background: rgba(255,255,255,0.95);
    transform: scale(1.04);
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  }

  .play-btn:active { transform: scale(0.95); }

  .play-btn svg { width: 28px; height: 28px; fill: #1a1a2e; }

  /* Volume */
  .volume-section {
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .vol-icon { color: rgba(255,255,255,0.5); display: flex; }
  .vol-icon svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.5); }

  .volume-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.18);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }

  .volume-fill {
    height: 100%;
    background: rgba(255,255,255,0.6);
    border-radius: 2px;
    width: 70%;
    pointer-events: none;
  }

  /* Shuffle/repeat */
  .extras {
    padding: 16px 28px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .extra-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 8px;
    border-radius: 8px;
    transition: all 0.15s ease;
  }

  .extra-btn:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.06); }
  .extra-btn.active { color: rgba(255,255,255,0.9); }
  .extra-btn svg { width: 18px; height: 18px; }

  /* No song state */
  .no-song {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 13px;
    font-weight: 400;
    padding: 8px 0;
  }
</style>
</head>
<body>

<!-- Upload button top right -->
<label class="upload-btn" for="fileInput">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
    <polyline points="17 8 12 3 7 8"/>
    <line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
  Upload MP3
</label>
<input type="file" id="fileInput" accept="audio/*,.mp3,.flac,.wav,.aac,.m4a">

<div class="player-wrap">
  <div class="player">
    <!-- Dynamic Island -->
    <div class="dynamic-island">
      <div class="di-camera"></div>
      <div style="width:32px;height:4px;background:#1a1a2e;border-radius:2px;"></div>
    </div>

    <!-- Artwork -->
    <div class="artwork-section">
      <div class="artwork-container" id="artworkContainer">
        <img class="artwork-img" id="artworkImg" src="" alt="Cover Art">
        <div class="artwork-placeholder" id="artworkPlaceholder">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M35 25v40" stroke="white" stroke-width="6" stroke-linecap="round"/>
            <path d="M35 25l35-10v40" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="35" cy="68" r="8" fill="white"/>
            <circle cx="70" cy="58" r="8" fill="white"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Song Info -->
    <div class="song-info">
      <div class="song-text" id="songTextContainer">
        <div class="song-name" id="songName">Song name</div>
        <div class="song-artist" id="songArtist">Artist</div>
      </div>
      <button class="heart-btn" id="heartBtn" onclick="toggleLike()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="progress-track" id="progressTrack" onclick="seekTo(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-labels">
        <span id="currentTime">0:00</span>
        <span id="totalTime">-0:00</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn small" onclick="skipBack()" title="Previous">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <polygon points="19 20 9 12 19 4 19 20"/>
          <line x1="5" y1="19" x2="5" y2="5" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      </button>

      <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" id="playIcon">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </button>

      <button class="ctrl-btn small" onclick="skipForward()" title="Next">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <polygon points="5 4 15 12 5 20 5 4"/>
          <line x1="19" y1="5" x2="19" y2="19" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      </button>
    </div>

    <!-- Volume -->
    <div class="volume-section">
      <div class="vol-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        </svg>
      </div>
      <div class="volume-track" id="volumeTrack" onclick="setVolume(event)">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
      <div class="vol-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
    </div>

    <!-- Shuffle / Repeat -->
    <div class="extras">
      <button class="extra-btn" id="shuffleBtn" onclick="toggleShuffle()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 3 21 3 21 8"/>
          <line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/>
          <line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
        Shuffle
      </button>
      <button class="extra-btn" id="repeatBtn" onclick="toggleRepeat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="17 1 21 5 17 9"/>
          <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/>
          <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
        Repeat
      </button>
    </div>
  </div>
</div>



<audio id="audioPlayer"></audio>

<script>
  const audio = document.getElementById('audioPlayer');
  const fileInput = document.getElementById('fileInput');
  const playIcon = document.getElementById('playIcon');
  const progressFill = document.getElementById('progressFill');
  const currentTimeEl = document.getElementById('currentTime');
  const totalTimeEl = document.getElementById('totalTime');
  const songNameEl = document.getElementById('songName');
  const songArtistEl = document.getElementById('songArtist');
  const artworkImg = document.getElementById('artworkImg');
  const artworkPlaceholder = document.getElementById('artworkPlaceholder');
  const artworkContainer = document.getElementById('artworkContainer');
  const volumeFill = document.getElementById('volumeFill');
  const volumeTrack = document.getElementById('volumeTrack');
  const songTextContainer = document.getElementById('songTextContainer');

  let isLiked = false;
  let isShuffle = false;
  let isRepeat = false;
  
  let scrollTimeout = null; // untuk jeda sebelum scroll mulai
  let isScrollingActive = false;

  // Fungsi untuk memulai scroll dengan jeda 2 detik + fade
  function startScrollWithDelay() {
    // Hapus animasi dan fade yang sedang berjalan
    stopScrollAndFade();
    
    const container = songTextContainer;
    const visibleWidth = container.clientWidth;
    const textWidth = songNameEl.scrollWidth;
    
    // Jika teks tidak overflow, tidak perlu scroll
    if (textWidth <= visibleWidth + 4) {
      return;
    }
    
    // Hitung jarak scroll yang diperlukan
    const dist = textWidth - visibleWidth + 20; // +20 biar benar-benar keliatan full
    songNameEl.style.setProperty('--scroll-dist', `-${dist}px`);
    
    // Jeda 2 detik, baru mulai scroll + fade
    scrollTimeout = setTimeout(() => {
      // Aktifkan class animasi pada judul
      songNameEl.classList.add('song-scrolling');
      // Aktifkan fade pada container (muncul gradient kiri kanan)
      songTextContainer.classList.add('fade-active');
      isScrollingActive = true;
    }, 2000); // 2 detik jeda
  }
  
  // Fungsi untuk menghentikan scroll dan fade
  function stopScrollAndFade() {
    if (scrollTimeout) {
      clearTimeout(scrollTimeout);
      scrollTimeout = null;
    }
    // Hapus class animasi dan fade
    songNameEl.classList.remove('song-scrolling');
    songTextContainer.classList.remove('fade-active');
    isScrollingActive = false;
    // Reset posisi translateX ke 0 (biar posisi awal lagi)
    songNameEl.style.transform = 'translateX(0)';
    // Force reflow biar animasi reset
    void songNameEl.offsetHeight;
  }
  
  // Fungsi untuk mereset dan memulai ulang scroll (dipanggil saat judul berubah)
  function resetAndStartScroll() {
    stopScrollAndFade();
    startScrollWithDelay();
  }
  
  // Observasi perubahan ukuran container (resize window)
  function handleResize() {
    if (isScrollingActive) {
      // Jika sedang scroll, stop dulu lalu mulai ulang dengan delay
      resetAndStartScroll();
    } else {
      // Jika tidak sedang scroll, cek apakah perlu scroll
      const container = songTextContainer;
      const visibleWidth = container.clientWidth;
      const textWidth = songNameEl.scrollWidth;
      if (textWidth > visibleWidth + 4) {
        resetAndStartScroll();
      } else {
        stopScrollAndFade();
      }
    }
  }
  
  // Event listener untuk resize
  window.addEventListener('resize', () => {
    setTimeout(handleResize, 100);
  });
  
  // Fungsi untuk mengecek overflow dan mulai scroll (dengan jeda)
  function checkTextOverflowAndScroll() {
    const container = songTextContainer;
    if (!container) return;
    const visibleWidth = container.clientWidth;
    const textWidth = songNameEl.scrollWidth;
    
    if (textWidth > visibleWidth + 4) {
      resetAndStartScroll();
    } else {
      stopScrollAndFade();
    }
  }

  // File input handler
  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);
    audio.src = url;

    // Extract filename as song name
    let name = file.name.replace(/\.[^/.]+$/, '');
    let artist = 'Unknown Artist';

    // Try to parse "Artist - Title" format
    if (name.includes(' - ')) {
      const parts = name.split(' - ');
      artist = parts[0].trim();
      name = parts.slice(1).join(' - ').trim();
    }

    songNameEl.textContent = name;
    songArtistEl.textContent = artist;

    // Reset scroll state sebelum mengecek ulang
    stopScrollAndFade();
    
    // Try to extract cover art via ID3 tags (using jsmediatags if available)
    await extractCoverArt(file);

    audio.load();
    audio.play();
    updatePlayIcon(true);
    artworkContainer.classList.add('playing');
    
    // Setelah metadata cover dan teks selesai, cek overflow
    setTimeout(() => {
      checkTextOverflowAndScroll();
    }, 50);
  });

  // Cover art extraction
  async function extractCoverArt(file) {
    return new Promise((resolve) => {
      if (window.jsmediatags) {
        readTags(file, resolve);
      } else {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js';
        script.onload = () => readTags(file, resolve);
        script.onerror = () => { showPlaceholder(); checkTextOverflowAndScroll(); resolve(); };
        document.head.appendChild(script);
      }
    });
  }

  function readTags(file, resolve) {
    window.jsmediatags.read(file, {
      onSuccess: (tag) => {
        const picture = tag.tags.picture;
        if (tag.tags.title) songNameEl.textContent = tag.tags.title;
        if (tag.tags.artist) songArtistEl.textContent = tag.tags.artist;
        
        // Setelah teks diperbarui, cek overflow dan scroll
        setTimeout(() => {
          checkTextOverflowAndScroll();
        }, 50);

        if (picture) {
          const arr = new Uint8Array(picture.data);
          const blob = new Blob([arr], { type: picture.format });
          const imgUrl = URL.createObjectURL(blob);
          artworkImg.src = imgUrl;
          artworkImg.classList.add('visible');
          artworkPlaceholder.style.display = 'none';
        } else {
          showPlaceholder();
        }
        resolve();
      },
      onError: () => { showPlaceholder(); checkTextOverflowAndScroll(); resolve(); }
    });
  }

  function showPlaceholder() {
    artworkImg.classList.remove('visible');
    artworkImg.src = '';
    artworkPlaceholder.style.display = 'flex';
  }

  // Play / pause
  function togglePlay() {
    if (!audio.src) return;
    if (audio.paused) {
      audio.play();
      updatePlayIcon(true);
      artworkContainer.classList.add('playing');
    } else {
      audio.pause();
      updatePlayIcon(false);
      artworkContainer.classList.remove('playing');
    }
  }

  function updatePlayIcon(playing) {
    if (playing) {
      playIcon.setAttribute('d', '');
      playIcon.innerHTML = `
        <rect x="6" y="4" width="4" height="16" rx="1"/>
        <rect x="14" y="4" width="4" height="16" rx="1"/>
      `;
    } else {
      playIcon.innerHTML = `<polygon points="5 3 19 12 5 21 5 3"/>`;
    }
  }

  // Skip
  function skipBack() {
    if (audio.currentTime > 3) {
      audio.currentTime = 0;
    } else {
      audio.currentTime = Math.max(0, audio.currentTime - 15);
    }
  }

  function skipForward() {
    audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 15);
  }

  // Progress
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    currentTimeEl.textContent = formatTime(audio.currentTime);
    const remaining = audio.duration - audio.currentTime;
    totalTimeEl.textContent = '-' + formatTime(remaining);
  });

  audio.addEventListener('loadedmetadata', () => {
    totalTimeEl.textContent = '-' + formatTime(audio.duration);
  });

  audio.addEventListener('ended', () => {
    if (isRepeat) {
      audio.currentTime = 0;
      audio.play();
    } else {
      updatePlayIcon(false);
      artworkContainer.classList.remove('playing');
    }
  });

  function seekTo(e) {
    if (!audio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  }

  // Volume
  audio.volume = 0.7;

  function setVolume(e) {
    const rect = volumeTrack.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    audio.volume = pct;
    volumeFill.style.width = (pct * 100) + '%';
  }

  // Like
  function toggleLike() {
    isLiked = !isLiked;
    document.getElementById('heartBtn').classList.toggle('liked', isLiked);
  }

  // Shuffle
  function toggleShuffle() {
    isShuffle = !isShuffle;
    document.getElementById('shuffleBtn').classList.toggle('active', isShuffle);
  }

  // Repeat
  function toggleRepeat() {
    isRepeat = !isRepeat;
    document.getElementById('repeatBtn').classList.toggle('active', isRepeat);
  }

  function formatTime(s) {
    if (isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }
  
  // Inisialisasi awal
  document.addEventListener('DOMContentLoaded', () => {
    checkTextOverflowAndScroll();
  });
  
  // MutationObserver untuk perubahan teks judul
  const observer = new MutationObserver(() => {
    // Setelah teks berubah, reset scroll
    setTimeout(() => {
      checkTextOverflowAndScroll();
    }, 30);
  });
  observer.observe(songNameEl, { childList: true, characterData: true, subtree: true });
  observer.observe(songArtistEl, { childList: true, characterData: true, subtree: true });
  
  const songName = document.getElementById('songName');
  const titleContainer = document.getElementById('titleContainer');

  function initScroll() {
    const containerWidth = titleContainer.offsetWidth;
    const textWidth = songName.scrollWidth;

    if (textWidth > containerWidth) {
      const dist = textWidth - containerWidth + 30;
      songName.style.setProperty('--scroll-dist', `-${dist}px`);
      
      // Pakai timeout biar fadenya muncul pas animasinya beneran mulai jalan
      setTimeout(() => {
        titleContainer.classList.add('is-scrolling');
      }, 2000); // Samakan dengan animation-delay di CSS

      songName.classList.add('song-scrolling-anim');
    }
  }

  window.onload = initScroll;
  // Saat hover atau interaksi, tidak perlu hentikan scroll (biarkan berjalan natural)
  // Tapi ketika teks diubah, reset.
</script>
</body>
</html>
